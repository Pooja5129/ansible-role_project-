---
# tasks file for webserver
 
- name: install nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: copy website
  copy: 
     src: index.html
     dest: /var/www/html/index.html
  notify: Restart nginx
- name: Show DB user
  debug:
    msg: "{{ db_user }}"

- name: Show DB password
  debug:
    msg: "{{ db_password }}"
